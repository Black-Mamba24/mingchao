<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>穿越明朝</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 顶部栏 -->
  <div class="game-topbar">
    <span class="gt-title">穿越明朝</span>
    <span id="act-badge" class="act-badge">第一幕 · 立志与临危</span>
    <span class="gt-meta" id="role-label">—</span>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-item">
      <span class="si-label">声望</span>
      <div class="status-track">
        <div class="status-fill fill-reputation" id="bar-reputation" style="width:50%"></div>
      </div>
      <span class="si-val" id="val-reputation">5</span>
    </div>
    <div class="status-item">
      <span class="si-label">风险</span>
      <div class="status-track">
        <div class="status-fill fill-risk" id="bar-risk" style="width:0%"></div>
      </div>
      <span class="si-val" id="val-risk">0</span>
    </div>
    <div class="status-item">
      <span class="si-label">历史洞察</span>
      <div class="status-track">
        <div class="status-fill fill-insight" id="bar-insight" style="width:0%"></div>
      </div>
      <span class="si-val" id="val-insight">0</span>
    </div>
  </div>

  <!-- 游戏主内容（单场景，无存档区） -->
  <div class="game-content">

    <!-- Loading + 小贴士：在场景内容区之前显示 -->
    <div class="loading-box" id="loading-box">
      <div class="dot-spin">
        <span></span><span></span><span></span>
      </div>
      <span id="loading-text">DeepSeek-V4 正在构建历史场景……</span>
    </div>
    <!-- 错误重试区 -->
    <div id="error-box" style="display:none; padding:16px 0;">
      <div id="error-text" style="color:var(--red); font-size:0.92rem;"></div>
      <button class="retry-btn" id="retry-btn">↺ 重新推演</button>
    </div>

    <!-- 当前活动场景（每次加载前完整清空此区域） -->
    <div id="scene-wrap">

      <!-- 场景描述 -->
      <div class="scene-text" id="scene-text"></div>

      <!-- NPC 对话 -->
      <div class="npc-box" id="npc-box" style="display:none">
        <div class="npc-avatar" id="npc-avatar">人</div>
        <div class="npc-content">
          <div class="npc-name" id="npc-name"></div>
          <div class="npc-text" id="npc-text"></div>
        </div>
      </div>

      <!-- 问题 -->
      <div class="question-text" id="question-text"></div>

      <!-- 选项 -->
      <div class="options-grid" id="options-grid" style="display:none"></div>

      <div class="post-choice-stack" id="post-choice-stack">
        <!-- 分数变化说明 -->
        <div class="score-change-box" id="score-change-box"></div>

        <!-- 后果描述 -->
        <div class="consequence-box" id="consequence-box"></div>

        <div class="tips-box" id="tips-box">
          <span class="tips-icon">📖</span>
          <div>
            <div class="tips-label">历史小贴士</div>
            <span id="tips-text"></span>
          </div>
        </div>
      </div>

      <!-- 继续按钮 -->
      <div style="text-align:center">
        <button class="continue-btn" id="continue-btn" style="display:none">继续 →</button>
      </div>

    </div>
  </div>

  <!-- 历史注释浮动按钮 -->
  <button class="note-toggle-btn" id="note-toggle" title="历史小知识" style="display:none">📜</button>

  <!-- 历史注释面板 -->
  <div class="note-panel" id="note-panel">
    <div class="note-header">📜 历史小知识</div>
    <div class="note-text" id="note-text"></div>
  </div>

  <div class="term-popover" id="term-popover">
    <div class="term-popover-title-row">
      <span class="term-popover-title" id="term-popover-title"></span>
      <span class="term-popover-category" id="term-popover-category"></span>
    </div>
    <div class="term-popover-body" id="term-popover-body"></div>
  </div>

  <script src="js/state-manager.js"></script>
  <script src="js/llm-client.js"></script>
  <script src="js/prompt-builder.js"></script>
  <script src="js/stream-renderer.js"></script>
  <script>
    let eventData = null;
    let currentRoleId = null;
    let isFirstScene = true; // 第一次进入不显示小贴士
    let prefetchedScene = null;
    let prefetchedStateKey = '';
    let prefetchedScenePromise = null;
    let pendingTipPromise = null;
    let pendingTipKey = '';

    // 兼容 acts 为数组（旧格式）或以 roleId 为 key 的对象（新格式）
    function getActs() {
      if (!eventData) return [];
      const acts = eventData.acts;
      if (Array.isArray(acts)) return acts;
      return (currentRoleId && acts[currentRoleId]) ? acts[currentRoleId] : [];
    }

    // ── 初始化 ──────────────────────────────────────────────
    async function init() {
      const state = StateManager.load();
      if (!state.eventId || !state.roleId) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const resp = await fetch(`data/${state.eventId}.json`);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        eventData = await resp.json();
        currentRoleId = state.roleId;
      } catch (e) {
        showError('历史数据加载失败，请检查 data/ 目录是否完整。');
        return;
      }

      const role = eventData.roles.find(r => r.id === state.roleId);
      document.getElementById('role-label').textContent =
        role ? role.name + ' · ' + role.subtitle : '';
      updateActBadge(state.act);

      loadScene();
    }

    // ── 状态栏 ──────────────────────────────────────────────
    function updateStatusBar() {
      const s = StateManager.get();
      document.getElementById('val-reputation').textContent = s.reputation;
      document.getElementById('val-risk').textContent       = s.risk;
      document.getElementById('val-insight').textContent    = s.insight;
      document.getElementById('bar-reputation').style.width = (s.reputation * 10) + '%';
      document.getElementById('bar-risk').style.width       = (s.risk * 10) + '%';
      document.getElementById('bar-insight').style.width    = (s.insight * 10) + '%';
    }

    function updateActBadge(act) {
      const nums = ['一','二','三','四'];
      const acts = getActs();
      const actName = acts[act - 1] ? acts[act - 1].title : '';
      document.getElementById('act-badge').textContent =
        `第${nums[act-1]}幕 · ${actName}`;
    }

    // ── 清空当前场景区（完整重置，无残留） ──────────────────
    function clearScene() {
      document.getElementById('scene-text').textContent      = '';
      document.getElementById('npc-box').style.display       = 'none';
      document.getElementById('npc-name').textContent        = '';
      document.getElementById('npc-text').textContent        = '';
      document.getElementById('question-text').textContent   = '';
      document.getElementById('options-grid').innerHTML      = '';
      document.getElementById('options-grid').style.display  = 'none';
      document.getElementById('score-change-box').innerHTML = '';
      document.getElementById('score-change-box').classList.remove('visible');
      document.getElementById('consequence-box').innerHTML = '';
      document.getElementById('consequence-box').classList.remove('visible');
      document.getElementById('continue-btn').style.display  = 'none';
      setLoading(false);
      hideTip();
      closeTermPopover();
      document.getElementById('note-toggle').style.display   = 'none';
      document.getElementById('note-panel').classList.remove('visible');
      hideError();
    }

    function buildSceneKey(state) {
      return `${state.eventId}|${state.roleId}|${state.act}|${state.scene}|${state.reputation}|${state.risk}|${state.insight}`;
    }

    // ── 小贴士 ──────────────────────────────────────────────
    function showTip(text) {
      if (!text) return;
      document.getElementById('tips-text').textContent = text;
      document.getElementById('tips-box').classList.add('visible');
    }
    function hideTip() {
      document.getElementById('tips-box').classList.remove('visible');
      document.getElementById('tips-text').textContent = '';
    }

    async function fetchTip(act, scene, state) {
      try {
        const msgs = PromptBuilder.buildTipMessages(eventData, currentRoleId, act, scene, state);
        const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${LLMClient.API_KEY}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: msgs,
            temperature: 0.9,
            max_tokens: 160
          })
        });
        if (!resp.ok) return '';
        const data = await resp.json();
        return data.choices?.[0]?.message?.content?.trim() || '';
      } catch (e) {
        return '';
      }
    }

    function prefetchTip(state) {
      const tipKey = buildSceneKey(state);
      if (pendingTipPromise && pendingTipKey === tipKey) return pendingTipPromise;
      pendingTipKey = tipKey;
      const promise = fetchTip(state.act, state.scene, state)
        .then(tipText => ({ key: tipKey, text: tipText || '' }));
      pendingTipPromise = promise;
      promise.finally(() => {
        if (pendingTipPromise === promise) {
          pendingTipPromise = null;
        }
      });
      return promise;
    }

    // ── loading 显示/隐藏 ────────────────────────────────────
    function setLoading(visible, text) {
      document.getElementById('loading-box').classList.toggle('visible', visible);
      if (visible && text) document.getElementById('loading-text').textContent = text;
    }

    // ── 错误显示/隐藏 ────────────────────────────────────────
    function showError(msg) {
      document.getElementById('error-text').textContent = '⚠ ' + msg;
      document.getElementById('error-box').style.display = 'block';
    }
    function hideError() {
      document.getElementById('error-box').style.display = 'none';
    }

    function renderScoreChange(scoreImpact) {
      const box = document.getElementById('score-change-box');
      const items = [
        { label: '声望', delta: scoreImpact.deltas.reputation, reason: scoreImpact.reasons.reputation },
        { label: '风险', delta: scoreImpact.deltas.risk, reason: scoreImpact.reasons.risk },
        { label: '历史洞察', delta: scoreImpact.deltas.insight, reason: scoreImpact.reasons.insight }
      ].filter(item => item.delta !== 0);

      if (!items.length) {
        box.innerHTML = '<div class="score-change-title">局势反馈</div><div class="score-change-item"><span class="score-change-label">三项数值未明显变化</span><span class="score-change-reason">：此举更多是在稳住局面。</span></div>';
        box.classList.add('visible');
        return;
      }

      box.innerHTML = `
        <div class="score-change-title">局势反馈</div>
        ${items.map(item => `
          <div class="score-change-item">
            <span class="score-change-label">${item.label} ${item.delta > 0 ? '+' : ''}${item.delta}</span><span class="score-change-reason">：${item.reason || '局势因此出现了相应波动。'}</span>
          </div>
        `).join('')}
      `;
      box.classList.add('visible');
    }

    function getCategoryLabel(category) {
      const labels = {
        person: '人物',
        place: '地名',
        weapon: '武器',
        era: '年号',
        office: '职位',
        institution: '机构',
        event: '事件',
        other: '名词'
      };
      return labels[category] || '名词';
    }

    function closeTermPopover() {
      document.querySelectorAll('.term-annotation.is-active').forEach(el => el.classList.remove('is-active'));
      document.getElementById('term-popover').classList.remove('visible');
    }

    function openTermPopover(target) {
      const popover = document.getElementById('term-popover');
      const titleEl = document.getElementById('term-popover-title');
      const categoryEl = document.getElementById('term-popover-category');
      const bodyEl = document.getElementById('term-popover-body');
      const rect = target.getBoundingClientRect();
      const maxWidth = Math.min(320, window.innerWidth - 24);

      document.querySelectorAll('.term-annotation.is-active').forEach(el => el.classList.remove('is-active'));
      target.classList.add('is-active');
      titleEl.textContent = target.dataset.term || '';
      categoryEl.textContent = getCategoryLabel(target.dataset.category);
      bodyEl.textContent = target.dataset.intro || '';
      popover.style.width = `${maxWidth}px`;
      popover.classList.add('visible');

      const popRect = popover.getBoundingClientRect();
      let left = rect.left;
      let top = rect.bottom + 10;
      if (left + popRect.width > window.innerWidth - 12) left = window.innerWidth - popRect.width - 12;
      if (left < 12) left = 12;
      if (top + popRect.height > window.innerHeight - 12) top = rect.top - popRect.height - 10;
      if (top < 12) top = 12;
      popover.style.left = `${left}px`;
      popover.style.top = `${top}px`;
    }

    async function renderSceneData(sceneData) {
      if (sceneData.npc_name) {
        document.getElementById('npc-avatar').textContent = sceneData.npc_name[0];
      }
      if (sceneData.historical_note) {
        document.getElementById('note-text').textContent = sceneData.historical_note;
      }

      const introducedKeys = await StreamRenderer.renderScene(sceneData, {
        sceneEl:    document.getElementById('scene-text'),
        npcEl:      document.getElementById('npc-box'),
        questionEl: document.getElementById('question-text'),
        optionsEl:  document.getElementById('options-grid'),
        noteEl:     document.getElementById('note-panel')
      }, StateManager.getIntroducedTerms(), StateManager.getIntroducedTermAliases());
      StateManager.markIntroducedTerms(introducedKeys);

      const currentState = StateManager.get();
      pendingTipPromise = null;
      pendingTipKey = '';
      prefetchTip(currentState);
      bindOptionEvents();
      isFirstScene = false;
    }

    async function prefetchNextScene() {
      const state = StateManager.get();
      if (state.finished) {
        prefetchedScene = null;
        prefetchedStateKey = '';
        prefetchedScenePromise = null;
        return null;
      }

      const sceneKey = buildSceneKey(state);
      if (prefetchedScene && prefetchedStateKey === sceneKey) return prefetchedScene;
      if (prefetchedScenePromise && prefetchedStateKey === sceneKey) return prefetchedScenePromise;

      prefetchedStateKey = sceneKey;
      prefetchedScenePromise = (async () => {
        try {
          const messages = PromptBuilder.buildMessages(eventData, state.roleId, state.act, state.scene, state);
          const sceneData = await LLMClient.chat(messages);
          prefetchedScene = sceneData;
          return sceneData;
        } catch (e) {
          prefetchedScene = null;
          prefetchedStateKey = '';
          throw e;
        } finally {
          prefetchedScenePromise = null;
        }
      })();

      return prefetchedScenePromise;
    }

    // ── 加载并渲染当前场景 ───────────────────────────────────
    async function loadScene() {
      const state = StateManager.get();
      if (state.finished) { window.location.href = 'ending.html'; return; }

      updateStatusBar();
      updateActBadge(state.act);

      clearScene();
      const sceneKey = buildSceneKey(state);

      if (prefetchedScene && prefetchedStateKey === sceneKey) {
        const sceneData = prefetchedScene;
        prefetchedScene = null;
        prefetchedStateKey = '';
        StateManager.pushHistory('assistant', JSON.stringify(sceneData));
        await renderSceneData(sceneData);
        return;
      }

      if (prefetchedScenePromise && prefetchedStateKey === sceneKey) {
        setLoading(true, 'DeepSeek-V4 正在构建历史场景……');
        try {
          const sceneData = await prefetchedScenePromise;
          prefetchedScene = null;
          prefetchedStateKey = '';
          StateManager.pushHistory('assistant', JSON.stringify(sceneData));
          setLoading(false);
          await renderSceneData(sceneData);
          return;
        } catch (e) {
          setLoading(false);
        }
      }

      setLoading(true, 'DeepSeek-V4 正在构建历史场景……');

      try {
        const messages  = PromptBuilder.buildMessages(eventData, state.roleId, state.act, state.scene, state);
        const sceneData = await LLMClient.chat(messages);

        StateManager.pushHistory('assistant', JSON.stringify(sceneData));
        setLoading(false);
        await renderSceneData(sceneData);
      } catch (e) {
        setLoading(false);
        showError('AI 生成失败：' + e.message);
      }
    }

    // ── 绑定选项点击 ─────────────────────────────────────────
    function bindOptionEvents() {
      const btns = document.querySelectorAll('#options-grid .option-btn');
      btns.forEach(btn => {
        btn.addEventListener('click', async () => {
          const optText      = btn.dataset.text;
          const repDelta     = parseInt(btn.dataset.reputationDelta) || 0;
          const riskDelta    = parseInt(btn.dataset.riskDelta)       || 0;
          const insightDelta = parseInt(btn.dataset.insightDelta)    || 0;

          // 禁用所有选项，高亮选中项
          btns.forEach(b => { b.disabled = true; });
          btn.classList.add('selected');

          const state = StateManager.get();
          const beforeScores = {
            reputation: state.reputation,
            risk: state.risk,
            insight: state.insight
          };
          const scoreImpact = {
            optionText: optText,
            before: beforeScores,
            deltas: {
              reputation: repDelta,
              risk: riskDelta,
              insight: insightDelta
            },
            after: {
              reputation: Math.max(0, Math.min(10, beforeScores.reputation + repDelta)),
              risk: Math.max(0, Math.min(10, beforeScores.risk + riskDelta)),
              insight: Math.max(0, Math.min(10, beforeScores.insight + insightDelta))
            },
            reasons: {
              reputation: btn.dataset.reputationReason || '',
              risk: btn.dataset.riskReason || '',
              insight: btn.dataset.insightReason || ''
            }
          };

          StateManager.recordChoice(state.act, state.scene, btn.dataset.id, optText);
          StateManager.pushHistory('user', `我选择：${optText}`);
          StateManager.applyDeltas({ reputation_delta: repDelta, risk_delta: riskDelta, insight_delta: insightDelta });
          StateManager.setLastScoreChange(scoreImpact);
          updateStatusBar();
          renderScoreChange(scoreImpact);

          // 生成后果
          const box = document.getElementById('consequence-box');
          box.innerHTML = '<div class="consequence-title">局势余波</div><div class="consequence-body"></div>';
          box.classList.add('visible');
          setLoading(true, 'AI 正在推演后果……');

          let consequenceText = '';
          const currentTipPromise = pendingTipPromise || prefetchTip(state);
          setLoading(true, 'AI 正在推演后果……');
          try {
            const msgs = PromptBuilder.buildConsequenceMessages(
              eventData, state.roleId, optText, StateManager.get(), scoreImpact
            );
            const consequenceData = await LLMClient.chat(msgs);
            const introducedKeys = await StreamRenderer.renderAnnotatedConsequence(
              box,
              consequenceData.consequence || '（历史的齿轮继续转动……）',
              consequenceData.consequence_annotations,
              StateManager.getIntroducedTerms(),
              StateManager.getIntroducedTermAliases()
            );
            StateManager.markIntroducedTerms(introducedKeys);
            consequenceText = consequenceData.consequence || '（历史的齿轮继续转动……）';
            StateManager.pushHistory('assistant', consequenceText);
          } catch (e) {
            box.innerHTML = '<div class="consequence-title">局势余波</div><div class="consequence-body">（历史的齿轮继续转动……）</div>';
            box.classList.add('visible');
            consequenceText = '（历史的齿轮继续转动……）';
          }

          setLoading(false);
          if (currentTipPromise) {
            const tipResult = await currentTipPromise;
            if (tipResult?.key === buildSceneKey(state)) {
              showTip(tipResult.text);
            }
          }

          // 记录完整场景上下文，供下一场景承上启下
          const sceneText = document.getElementById('scene-text').textContent;
          StateManager.setLastSceneContext(sceneText, optText, consequenceText);
          StateManager.nextScene();

          const nextState = StateManager.get();
          prefetchNextScene();

          // 显示继续按钮
          const continueBtn = document.getElementById('continue-btn');
          continueBtn.textContent   = nextState.finished ? '查看结局 →' : '继续 →';
          continueBtn.style.display = 'inline-block';
        });
      });
    }

    // ── 继续按钮：清空当前场景，加载下一场景 ────────────────
    document.getElementById('continue-btn').addEventListener('click', () => {
      const state = StateManager.get();
      if (state.finished) {
        window.location.href = 'ending.html';
        return;
      }
      // 直接清空并加载新场景，无存档
      loadScene();
    });

    // ── 重试按钮 ─────────────────────────────────────────────
    document.getElementById('retry-btn').addEventListener('click', () => {
      hideError();
      loadScene();
    });

    // ── 历史注释 ─────────────────────────────────────────────
    document.getElementById('note-toggle').addEventListener('click', () => {
      document.getElementById('note-panel').classList.toggle('visible');
    });
    document.getElementById('scene-wrap').addEventListener('click', e => {
      const target = e.target.closest('.term-annotation');
      if (!target) return;
      if (target.classList.contains('is-active')) {
        closeTermPopover();
        return;
      }
      openTermPopover(target);
    });
    document.addEventListener('click', e => {
      const panel = document.getElementById('note-panel');
      const btn   = document.getElementById('note-toggle');
      const termPopover = document.getElementById('term-popover');
      const annotation = e.target.closest('.term-annotation');
      if (!panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.remove('visible');
      }
      if (!termPopover.contains(e.target) && !annotation) {
        closeTermPopover();
      }
    });
    window.addEventListener('resize', () => {
      closeTermPopover();
    });

    // ── 启动 ─────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
